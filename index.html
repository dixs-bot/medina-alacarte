<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4B2E2B" />
  <meta name="description" content="Medina Alacarte — Premium Coffee & Pastries. Pesan coffee favoritmu langsung dari aplikasi." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Medina Alacarte ☕</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <!-- Design System -->
  <link rel="stylesheet" href="/src/styles/variables.css" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/animation.css" />
</head>
<body>

  <!-- ====== BRANDED LOADER ====== -->
 <div id="global-loader" class="global-loader">
  <div class="spinner"></div>
</div>
  <div class="app-loader" id="app-loader">
    <div class="loader-scene">
      <div class="loader-coffee">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <!-- Cup -->
          <path d="M12 22h28a4 4 0 014 4v18a4 4 0 01-4 4H12a4 4 0 01-4-4V26a4 4 0 014-4z" fill="#6F4E37" opacity="0.9"/>
          <path d="M8 28h36" stroke="#4B2E2B" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Handle -->
          <path d="M40 26h4a6 6 0 010 12h-4" stroke="#6F4E37" stroke-width="3" stroke-linecap="round" fill="none"/>
          <!-- Saucer -->
          <ellipse cx="26" cy="52" rx="20" ry="4" fill="#C4A484" opacity="0.5"/>
          <!-- Steam -->
          <path class="steam steam-1" d="M20 18c0-4 4-4 4-8" stroke="#C4A484" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path class="steam steam-2" d="M26 16c0-4 4-4 4-8" stroke="#C4A484" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path class="steam steam-3" d="M32 18c0-4 4-4 4-8" stroke="#C4A484" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="loader-text">
        <span class="loader-brand">Medina Alacarte</span>
        <span class="loader-tagline">Premium Coffee & Pastries</span>
      </div>
      <div class="loader-bar">
        <div class="loader-bar-fill" id="loader-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- ====== APP ROOT (dimuat setelah redirect) ====== -->
  <main id="app-root" style="display:none;"></main>

  <!-- ====== ENTRY MODULE ====== -->
  <script type="module" src="/src/js/core/app.js"></script>

  <style>
    /* ── Loader Styles (inline karena ini splash screen, harus instant) ── */
    .app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        160deg,
        #2A1B17 0%,
        #4B2E2B 35%,
        #6F4E37 65%,
        #4B2E2B 100%
      );
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  visibility 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .app-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .loader-coffee {
      animation: loaderFloat 2.5s ease-in-out infinite;
    }

    @keyframes loaderFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Steam animation */
    .steam {
      opacity: 0;
      animation: steamRise 2s ease-in-out infinite;
    }
    .steam-1 { animation-delay: 0s; }
    .steam-2 { animation-delay: 0.4s; }
    .steam-3 { animation-delay: 0.8s; }

    @keyframes steamRise {
      0% {
        opacity: 0;
        transform: translateY(0) scaleX(1);
      }
      30% {
        opacity: 0.6;
      }
      100% {
        opacity: 0;
        transform: translateY(-12px) scaleX(1.4);
      }
    }

    .loader-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .loader-brand {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #F5F5F5;
      letter-spacing: -0.01em;
    }

    .loader-tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      color: #C4A484;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Progress bar */
    .loader-bar {
      width: 160px;
      height: 3px;
      border-radius: 99px;
      background: rgba(196, 164, 132, 0.2);
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #C4A484, #E6D3B3);
      transition: width 0.3s ease;
    }

    .loader-bar-fill.active {
      animation: loaderProgress 1.8s ease-in-out forwards;
    }

    @keyframes loaderProgress {
      0% { width: 0%; }
      20% { width: 25%; }
      50% { width: 55%; }
      75% { width: 80%; }
      90% { width: 92%; }
      100% { width: 100%; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .loader-coffee { animation: none; }
      .steam { animation: none; opacity: 0.4; }
      .loader-bar-fill.active { animation-duration: 0.3s; }
    }
  </style>
</body>
</html>
